<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CRM 통합 대시보드</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="stylesheet" href="styles.css" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="charts.jsx"></script>
<script type="text/babel" src="sidebar.jsx"></script>
<script type="text/babel" src="dashboards.jsx"></script>
<script type="text/babel" src="otherpages.jsx"></script>
<script type="text/babel" src="sales-data.jsx"></script>
<script type="text/babel" src="sales-pages.jsx"></script>
<script type="text/babel" src="newpages.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "blue",
  "compactDensity": false,
  "sidebarCollapsed": false,
  "showSearch": true
}/*EDITMODE-END*/;

const ACCENTS = {
  blue: { '--blue': '#2563EB', '--blue-soft': '#EFF4FF', '--blue-strong': '#1D4ED8', '--sidebar-accent': '#3B82F6' },
  indigo: { '--blue': '#4F46E5', '--blue-soft': '#EEF2FF', '--blue-strong': '#3730A3', '--sidebar-accent': '#6366F1' },
  teal: { '--blue': '#0D9488', '--blue-soft': '#F0FDFA', '--blue-strong': '#115E59', '--sidebar-accent': '#14B8A6' },
};

function App() {
  const [route, setRoute] = React.useState('dash:it');
  const [mobileOpen, setMobileOpen] = React.useState(false);
  const [drillFilter, setDrillFilter] = React.useState(null);
  const [selectedLead, setSelectedLead] = React.useState(null);
  const [tweaks, setTweak] = window.useTweaks(TWEAK_DEFAULTS);

  // Apply accent
  React.useEffect(() => {
    const colors = ACCENTS[tweaks.accent] || ACCENTS.blue;
    Object.entries(colors).forEach(([k, v]) => document.documentElement.style.setProperty(k, v));
  }, [tweaks.accent]);

  React.useEffect(() => {
    document.body.style.fontSize = tweaks.compactDensity ? '13px' : '14px';
  }, [tweaks.compactDensity]);

  const handleDrilldown = (filter) => {
    setDrillFilter(filter);
    setRoute('rawdata');
  };
  const clearDrill = () => {
    setDrillFilter(null);
    if (drillFilter?.unitId) setRoute('dash:' + drillFilter.unitId);
  };

  const handleSetRoute = (r) => {
    if (!r.startsWith('rawdata')) setDrillFilter(null);
    if (r !== 'sales') setSelectedLead(null);
    setRoute(r);
  };

  // Derive page + breadcrumb
  let page, crumbs;
  if (route === 'dash:it') {
    crumbs = ['워크스페이스', 'IT사업부 통합'];
    page = <window.NewPages.ITConsolidatedDashboard onNavigate={handleSetRoute} onDrilldown={handleDrilldown} />;
  } else if (route.startsWith('dash:')) {
    const unitId = route.split(':')[1];
    const unit = window.CRMData.businessUnits.find(u => u.id === unitId);
    crumbs = ['사업부별 대시보드', unit.name];
    page = <window.Pages.UnitDashboard unitId={unitId} onDrilldown={handleDrilldown} />;
  } else if (route === 'collections') {
    crumbs = ['운영 관리', '수금 미정'];
    page = <window.OtherPages.CollectionsPage />;
  } else if (route === 'rawdata') {
    crumbs = ['운영 관리', '로우 데이터'];
    page = <window.OtherPages.RawDataPage initialFilter={drillFilter} onClearFilter={clearDrill} />;
  } else if (route === 'about') {
    crumbs = ['시스템 및 지원', 'About'];
    page = <window.OtherPages.AboutPage />;
  } else if (route === 'feedback') {
    crumbs = ['시스템 및 지원', 'Feedback'];
    page = <window.OtherPages.FeedbackPage />;
  } else if (route === 'gallery') {
    crumbs = ['시스템 및 지원', 'App Gallery'];
    page = <window.OtherPages.GalleryPage />;
  } else if (route === 'users') {
    crumbs = ['관리자', '사용자/권한'];
    page = <window.NewPages.UsersPage />;
  } else if (route === 'audit') {
    crumbs = ['관리자', '감사 로그'];
    page = <window.NewPages.AuditLogPage />;
  } else if (route === 'notifications') {
    crumbs = ['관리자', '알림 센터'];
    page = <window.NewPages.NotificationsPage />;
  } else if (route === 'reports') {
    crumbs = ['관리자', '보고서 빌더'];
    page = <window.NewPages.ReportBuilderPage />;
  } else if (route === 'sales') {
    if (selectedLead) {
      crumbs = ['영업 관리', '리드 상세'];
      page = <window.SalesPages.LeadDetailPage lead={selectedLead} onBack={() => setSelectedLead(null)} />;
    } else {
      crumbs = ['영업 관리', '영업 대시보드'];
      page = <window.SalesPages.SalesDashboardPage onSelectLead={setSelectedLead} />;
    }
  }

  const I = window.Icons;
  const T = window.TweaksPanel ? window : null;

  return (
    <div className="app">
      <window.Sidebar route={route} setRoute={handleSetRoute} mobileOpen={mobileOpen} setMobileOpen={setMobileOpen} />
      <div className="main">
        <div className="topbar">
          <button className="icon-btn mobile-toggle" onClick={() => setMobileOpen(true)}>
            <I.menu style={{ width: 16, height: 16 }} />
          </button>
          <div className="breadcrumb">
            {crumbs.map((c, i) => (
              <React.Fragment key={i}>
                {i > 0 && <span className="sep">›</span>}
                <span style={{ color: i === crumbs.length - 1 ? 'var(--text)' : 'var(--text-3)', fontWeight: i === crumbs.length - 1 ? 600 : 400 }}>{c}</span>
              </React.Fragment>
            ))}
          </div>
          <div className="topbar-spacer" />
          <span style={{ fontSize: 12, color: 'var(--text-3)' }}>2026.05.01 (금) · 17:30 KST</span>
          <button className="topbar-action"><I.bell style={{ width: 14, height: 14 }} /></button>
          <button className="topbar-action primary"><I.download style={{ width: 14, height: 14 }} /> 보고서</button>
        </div>
        <div className="content" data-screen-label={crumbs.join(' / ')}>
          {page}
        </div>
      </div>

      <window.NewPages.ToastHost />
      {window.TweaksPanel && (
        <window.TweaksPanel title="Tweaks">
          <window.TweakSection title="테마">
            <window.TweakRadio label="Accent 컬러" value={tweaks.accent} onChange={v => setTweak('accent', v)}
              options={[
                { value: 'blue', label: 'Blue' },
                { value: 'indigo', label: 'Indigo' },
                { value: 'teal', label: 'Teal' },
              ]} />
          </window.TweakSection>
          <window.TweakSection title="레이아웃">
            <window.TweakToggle label="컴팩트 밀도" value={tweaks.compactDensity} onChange={v => setTweak('compactDensity', v)} />
            <window.TweakToggle label="사이드바 검색" value={tweaks.showSearch} onChange={v => setTweak('showSearch', v)} />
          </window.TweakSection>
          <window.TweakSection title="빠른 이동">
            <window.TweakButton label="IT 사업부" onClick={() => handleSetRoute('dash:it')} />
            <window.TweakButton label="마이메일러" onClick={() => handleSetRoute('dash:mymailer')} />
            <window.TweakButton label="수금 미정" onClick={() => handleSetRoute('collections')} />
            <window.TweakButton label="로우 데이터" onClick={() => handleSetRoute('rawdata')} />
            <window.TweakButton label="영업 대시보드" onClick={() => handleSetRoute('sales')} />
            <window.TweakButton label="감사 로그" onClick={() => handleSetRoute('audit')} />
            <window.TweakButton label="보고서 빌더" onClick={() => handleSetRoute('reports')} />
          </window.TweakSection>
        </window.TweaksPanel>
      )}
    </div>
  );
}

// Wait for all components to load
function boot() {
  if (!window.CRMData || !window.Icons || !window.Charts || !window.Sidebar || !window.Pages || !window.OtherPages || !window.SalesData || !window.SalesPages || !window.NewPages || !window.useTweaks || !window.TweaksPanel) {
    setTimeout(boot, 50);
    return;
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
}
boot();
</script>
</body>
</html>
